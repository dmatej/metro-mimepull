name: MimePull

on:
  pull_request:
  push:

jobs:
  build:
    name: Test on JDK ${{ matrix.java_version }} 
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java_version: [ 17, 25, 26 ]

    steps:
    - name: Checkout for build
      uses: actions/checkout@v6.0.2
    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java_version }}
    - name: Verify
      run: mvn -B -V -U -C -Poss-release clean verify org.glassfish.copyright:glassfish-copyright-maven-plugin:check -Dgpg.skip=true -Dcopyright.ignoreyear=true
